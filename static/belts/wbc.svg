<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 80">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#00c853"/><stop offset="50%" stop-color="#00b050"/><stop offset="100%" stop-color="#007a2f"/></linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ffe566"/><stop offset="50%" stop-color="#f5c400"/><stop offset="100%" stop-color="#b8860b"/></linearGradient>
  </defs>
  <!-- Belt strap -->
  <rect x="2" y="28" width="116" height="24" rx="4" fill="url(#g1)" stroke="#007a2f" stroke-width="1"/>
  <!-- Center plate -->
  <rect x="30" y="8" width="60" height="64" rx="8" fill="url(#gold)" stroke="#b8860b" stroke-width="1.5"/>
  <rect x="33" y="11" width="54" height="58" rx="6" fill="none" stroke="#ffe566" stroke-width="0.8" opacity="0.6"/>
  <!-- Globe -->
  <circle cx="60" cy="40" r="20" fill="url(#g1)" stroke="#007a2f" stroke-width="1.2"/>
  <ellipse cx="60" cy="40" rx="20" ry="8" fill="none" stroke="#00e676" stroke-width="0.8" opacity="0.5"/>
  <line x1="60" y1="20" x2="60" y2="60" stroke="#00e676" stroke-width="0.8" opacity="0.5"/>
  <!-- WBC text -->
  <text x="60" y="37" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="7" font-weight="900" fill="#ffe566">WBC</text>
  <text x="60" y="46" text-anchor="middle" font-family="Arial,sans-serif" font-size="4" font-weight="700" fill="#ffe566">WORLD BOXING</text>
  <text x="60" y="52" text-anchor="middle" font-family="Arial,sans-serif" font-size="4" font-weight="700" fill="#ffe566">COUNCIL</text>
  <!-- Side plates -->
  <rect x="4" y="30" width="26" height="20" rx="3" fill="url(#gold)" stroke="#b8860b" stroke-width="1"/>
  <text x="17" y="42" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="5" font-weight="900" fill="#007a2f">WBC</text>
  <rect x="90" y="30" width="26" height="20" rx="3" fill="url(#gold)" stroke="#b8860b" stroke-width="1"/>
  <text x="103" y="42" text-anchor="middle" font-family="Arial Black,sans-serif" font-size="5" font-weight="900" fill="#007a2f">WBC</text>
</svg>
